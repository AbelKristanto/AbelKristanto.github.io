# About page
about_lead: "Saya adalah profesional data Indonesia yang bekerja di persimpangan analitik, AI, otomasi, dan pendidikan."
about_goal: "Pekerjaan saya berpusat pada satu tujuan sederhana: membuat pekerjaan teknis lebih mudah dipahami, lebih mudah digunakan, dan lebih bernilai bagi orang-orang di balik keputusan."
about_what_people_need: "Apa yang biasanya orang cari dari saya"
about_need_1: "Mengubah data mentah menjadi dashboard, laporan, dan penjelasan yang benar-benar bisa digunakan manajer."
about_need_2: "Meningkatkan alur kerja dengan otomasi, pemantauan, dan eksperimen AI praktis."
about_need_3: "Mengajarkan topik data dan AI dengan cara yang terstruktur, mudah didekati, dan relevan."
about_experience_title: "Ringkasan pengalaman"
about_exp_finance_title: "Manajer, Layanan Keuangan"
about_exp_finance_desc: "Membangun dashboard pemantauan dan alur kerja otomasi untuk meningkatkan kecepatan, visibilitas, dan konsistensi."
about_exp_finance_1: "Mengurangi waktu proses manual lebih dari 90 persen melalui RPA."
about_exp_finance_2: "Memimpin lebih dari 10 inisiatif otomasi setiap tahun."
about_exp_community_title: "Pemimpin Komunitas, Ekosistem BUMN"
about_exp_community_desc: "Mendukung pembelajaran skala besar dan pertumbuhan komunitas seputar data science dan AI."
about_exp_community_1: "Menjangkau lebih dari 3.000 profesional."
about_exp_community_2: "Membantu membentuk program pengembangan kapabilitas praktis."
about_exp_mentor_title: "Mentor dan Pendidik"
about_exp_mentor_desc: "Membimbing pelajar dari dasar hingga analitik terapan dan machine learning."
about_exp_mentor_1: "Membimbing lebih dari 1.000 pelajar."
about_exp_mentor_2: "Dikenal karena penjelasan yang praktis dan ramah pemula."
about_education_title: "Pendidikan dan kredensial"
about_edu_1: "Studi teknik di Institut Teknologi Bandung."
about_edu_2: "S.T. Teknik Industri dari Universitas Diponegoro."
about_edu_3: "Tersertifikasi UiPath REFramework, Tableau Desktop, BNSP Data Scientist, dan Azure AI Fundamentals."
about_research_title: "Riset dan publikasi"
about_research_desc: "Saya telah berkontribusi pada 13 publikasi di bidang analitik, kualitas layanan, ergonomi, dan teknologi terapan."

# What I Do page
skills_lead: "Pekerjaan saya berada di empat area yang saling terhubung: analitik, otomasi AI, mentoring, dan berbicara."
skills_analytics_title: "Analitik dan dashboard"
skills_analytics_desc: "Saya merancang dashboard dan tampilan pelaporan yang membantu tim memahami kinerja, pola, dan prioritas."
skills_ai_title: "AI dan otomasi"
skills_ai_desc: "Saya menggunakan otomasi dan AI praktis untuk mengurangi pekerjaan berulang dan membuat informasi lebih mudah diakses."
skills_mentoring_title: "Mentoring dan desain pembelajaran"
skills_mentoring_desc: "Saya membantu pelajar dan tim memahami topik data melalui panduan praktis, contoh, dan sesi terstruktur."
skills_speaking_title: "Pembicara dan workshop"
skills_speaking_desc: "Saya berbicara tentang analitik, machine learning, SQL, Python, AI, dan pengembangan kapabilitas digital praktis."
skills_how_title: "Cara saya biasanya bekerja"
skills_how_1_title: "1. Memahami tujuan"
skills_how_1_desc: "Saya memulai dari kebutuhan bisnis atau pembelajaran, bukan dari alat."
skills_how_2_title: "2. Menyederhanakan jalur"
skills_how_2_desc: "Saya fokus pada output yang berguna, mudah dibaca, dan berkelanjutan."
skills_how_3_title: "3. Membuat hasil yang bisa dipahami"
skills_how_3_desc: "Hasil akhir harus membantu orang bertindak, bukan hanya mengagumi tekniknya."

