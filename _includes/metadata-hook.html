{% include head-fonts.html %}

<!-- Translated hreflang meta tags for SEO -->
{% for lang in site.languages %}
  {% if lang == site.default_lang %}
    <link rel="alternate" hreflang="{{ lang }}" href="{{ site.url }}{{ page.url }}" />
  {% else %}
    <link rel="alternate" hreflang="{{ lang }}" href="{{ site.url }}/{{ lang }}{{ page.url }}" />
  {% endif %}
{% endfor %}
<link rel="alternate" hreflang="x-default" href="{{ site.url }}{{ page.url }}" />

<!-- FOUC prevention: set data-theme before first paint -->
<script>
(function() {
  var STORAGE_KEY = 'site-theme';
  var stored = null;
  try { stored = localStorage.getItem(STORAGE_KEY); } catch (e) {}
  var preferred = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  var theme = stored || preferred;
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>
