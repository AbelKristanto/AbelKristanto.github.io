<script>
  (function() {
    var root = document.documentElement;
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
    root.classList.add('reveal-ready');

    function applyRevealTargets() {
      var selectors = [
        '.home-section',
        '.content > h2',
        '.content > h3',
        '.content > p',
        '.content > ul',
        '.content > ol',
        '.content > .quick-facts',
        '.content > .section-card-grid',
        '.content > .project-grid',
        '.content > .contact-grid',
        '.content > .service-grid'
      ];

      document.querySelectorAll(selectors.join(',')).forEach(function(element, index) {
        if (element.classList.contains('reveal-on-scroll')) {
          return;
        }

        element.classList.add('reveal-on-scroll');
        element.style.setProperty('--reveal-delay', String(Math.min(index * 60, 240)) + 'ms');
      });
    }

    function showImmediately() {
      document.querySelectorAll('.reveal-on-scroll').forEach(function(element) {
        element.classList.add('is-visible');
      });
    }

    function setupObserver() {
      if (reduceMotion.matches || !('IntersectionObserver' in window)) {
        showImmediately();
        return;
      }

      var observer = new IntersectionObserver(
        function(entries) {
          entries.forEach(function(entry) {
            if (!entry.isIntersecting) {
              return;
            }

            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          });
        },
        {
          threshold: 0.16,
          rootMargin: '0px 0px -10% 0px'
        }
      );

      document.querySelectorAll('.reveal-on-scroll').forEach(function(element) {
        observer.observe(element);
      });
    }

    applyRevealTargets();
    setupObserver();

    if (typeof reduceMotion.addEventListener === 'function') {
      reduceMotion.addEventListener('change', function() {
        showImmediately();
      });
    }
  })();
</script>
