<!-- Theme Toggle Button — Requirements 6.1, 6.5 -->
<div class="theme-toggle--nav">
  <button id="theme-toggle" class="theme-toggle-btn"
          aria-label="{{ site.data[site.active_lang].strings.theme_toggle_label | default: site.data.en.strings.theme_toggle_label }}"
          type="button">
    <!-- Sun icon (visible in light mode) -->
    <span class="theme-toggle-icon theme-toggle-icon--sun" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </span>
    <!-- Moon icon (visible in dark mode) -->
    <span class="theme-toggle-icon theme-toggle-icon--moon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </span>
  </button>
</div>

<style>
  /* Theme toggle icon transitions — Requirement 6.5: 200ms–400ms CSS transform/opacity */
  .theme-toggle-btn {
    position: relative;
    overflow: hidden;
  }

  .theme-toggle-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: opacity 300ms ease, transform 300ms ease;
  }

  /* Light mode: show sun, hide moon */
  .theme-toggle-icon--sun {
    opacity: 1;
    transform: translate(-50%, -50%) rotate(0deg) scale(1);
  }

  .theme-toggle-icon--moon {
    opacity: 0;
    transform: translate(-50%, -50%) rotate(-90deg) scale(0.5);
  }

  /* Dark mode: show moon, hide sun */
  [data-theme="dark"] .theme-toggle-icon--sun {
    opacity: 0;
    transform: translate(-50%, -50%) rotate(90deg) scale(0.5);
  }

  [data-theme="dark"] .theme-toggle-icon--moon {
    opacity: 1;
    transform: translate(-50%, -50%) rotate(0deg) scale(1);
  }

  /* Respect reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .theme-toggle-icon {
      transition: none;
    }
  }
</style>
