<script>
  (function() {
    var STORAGE_KEY = 'preferred-language';
    var root = document.documentElement;
    var buttons = Array.prototype.slice.call(document.querySelectorAll('[data-lang-button]'));

    function setActive(lang) {
      buttons.forEach(function(button) {
        var isActive = button.getAttribute('data-lang-button') === lang;
        button.classList.toggle('is-active', isActive);
        button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });
    }

    function applyLanguage(lang) {
      var nextLang = lang === 'id' ? 'id' : 'en';
      root.setAttribute('data-ui-lang', nextLang);
      root.lang = nextLang;
      setActive(nextLang);

      try {
        window.localStorage.setItem(STORAGE_KEY, nextLang);
      } catch (error) {
        // Ignore storage failures and keep the current session state.
      }
    }

    var initialLang = 'en';

    try {
      var storedLang = window.localStorage.getItem(STORAGE_KEY);
      if (storedLang === 'en' || storedLang === 'id') {
        initialLang = storedLang;
      }
    } catch (error) {
      initialLang = 'en';
    }

    buttons.forEach(function(button) {
      button.addEventListener('click', function() {
        applyLanguage(button.getAttribute('data-lang-button'));
      });
    });

    applyLanguage(initialLang);
  })();
</script>
