<!-- Simplified Top Bar -->

<header id="topbar-wrapper" aria-label="Top Bar">
  <div id="topbar" class="px-lg-3">
    <div class="topbar-main">
      <div class="topbar-copy">
        <p class="topbar-kicker">
          {% if page.layout == 'home' %}Personal website{% else %}Explore{% endif %}
        </p>
        <div id="topbar-title">
          {% if page.layout == 'home' %}
            Overview
          {% else %}
            {{ page.title | default: site.title }}
          {% endif %}
        </div>
      </div>

      <div class="topbar-actions">
        <a href="{{ '/contact/' | relative_url }}" class="btn btn-primary btn-sm topbar-cta">
          Contact
        </a>
        <button type="button" id="sidebar-trigger" class="btn btn-link topbar-menu" aria-label="Open profile panel">
          <i class="fas fa-bars fa-fw"></i>
        </button>
      </div>
    </div>

    <nav class="topbar-nav" aria-label="Primary navigation">
      <a href="{{ '/' | relative_url }}" class="topbar-nav-link{% if page.layout == 'home' %} is-active{% endif %}">
        Home
      </a>

      {% for tab in site.tabs %}
        <a href="{{ tab.url | relative_url }}" class="topbar-nav-link{% if tab.url == page.url %} is-active{% endif %}">
          <span>{{ tab.title | default: page.title }}</span>
        </a>
      {% endfor %}
    </nav>
  </div>
</header>
